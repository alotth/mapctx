<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks Dashboard</title>
  <link rel="stylesheet" href="./kanban-roadmap.css" />
</head>
<body>
  <header class="topbar">
    <div class="title-group">
      <h1 id="board-title">Tasks Dashboard</h1>
      <span id="board-mode" class="mode-badge">Model: v2-status</span>
      <span id="board-meta"></span>
    </div>
    <div class="actions">
      <div id="zoom-controls" class="zoom-controls hidden">
        <label class="zoom-label" for="zoom-preset">Zoom</label>
        <select id="zoom-preset" class="zoom-select">
          <option value="month">Month</option>
          <option value="quarter">Quarter</option>
          <option value="year">Year</option>
        </select>
        <button id="btn-group-status" class="btn toggle-btn active" type="button">Status</button>
        <button id="btn-group-milestone" class="btn toggle-btn" type="button">Milestone</button>
        <button id="btn-today" class="btn" type="button">Today</button>
        <button id="btn-scroll-left" class="btn" type="button" aria-label="Scroll left">&#8249;</button>
        <button id="btn-scroll-right" class="btn" type="button" aria-label="Scroll right">&#8250;</button>
      </div>
    </div>
    <div class="view-switcher">
      <button id="tab-kanban" class="tab active" type="button">Kanban</button>
      <button id="tab-roadmap" class="tab" type="button">Roadmap</button>
    </div>
  </header>

  <main>
    <section id="kanban-view" class="view active"></section>
    <section id="roadmap-view" class="view"></section>
    <section id="log-view" class="log-view"></section>
  </main>

  <div id="detail-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="detail"></div>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="detail-modal-title">
      <header class="modal-head">
        <h2 id="detail-modal-title">Task details</h2>
        <button type="button" class="modal-close" data-close-modal="detail">Close</button>
      </header>
      <div id="detail-modal-content" class="modal-content"></div>
    </section>
  </div>

  <script src="./core-helpers.js"></script>
  <script src="./kanban-roadmap.js"></script>
</body>
</html>
